<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Image Slider</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
        <div id="main-container">
            <div id="slider-container">
                <button id="previous-slide-btn" class="arrow-btn">
                    <i class="fa-solid fa-chevron-left" style="color: white;"></i>
                </button>
                <div id="image-container">
                    <img>
                </div>
                <button id="next-slide-btn" class="arrow-btn">
                    <i class="fa-solid fa-chevron-right" style="color: white;"></i>
                </button>
            </div>
            <div id="navigation-circles">
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
