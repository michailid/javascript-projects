<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Countdown Clock</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
</head>
<body>
    <h3 id="pick-date-label">Pick a date to count down to:</h3>
    <div id="date-picker-container">
        <input type="date" id="date-picker"/>
    </div>
    <span id="clock-container">
        <span id="days-container" class="time-container">
            <span id="days-number" class="number"></span>
            <span id="days-label" class="label">Days</span>              
        </span>
        <span id="hours-container" class="time-container">
            <span id="hours-number" class="number"></span>
            <span id="hours-label" class="label">Hours</span>              
        </span>
        <span id="minutes-container" class="time-container">
            <span id="minutes-number" class="number"></span>
            <span id="minutes-label" class="label">Minutes</span>              
        </span>
        <span id="seconds-container" class="time-container">
            <span id="seconds-number" class="number"></span>
            <span id="seconds-label" class="label">Seconds</span>              
        </span>
    </span>

    <script src="script.js"></script>
</body>
</html>
