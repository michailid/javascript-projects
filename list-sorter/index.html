<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List sorter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <ol id="item-list">
            <li class="list-item">Apple</li>
            <li class="list-item">Mango</li>
            <li class="list-item">Banana</li>
            <li class="list-item">Aeroplane</li>
            <li class="list-item">Umbrella</li>
            <li class="list-item">Carrot</li>
            <li class="list-item">Zebra</li>
            <li class="list-item">Doll</li>
        </ol>
        <button id="sort-btn" onclick="sortList()">Sort</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
