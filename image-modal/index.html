<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img id="image" src="images/chris-chow-JAZfQZRNYvE-unsplash.jpg" alt='Butterfly (Photo by <a href="https://unsplash.com/@chris_chow?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Chris Chow</a> on <a href="https://unsplash.com/photos/shallow-focus-photo-of-orange-butterfly-JAZfQZRNYvE?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>)'>

    <div id="modal-container">
        <span id="close-btn">&times;</span>
        <img id="modal-image">
        <div id="description"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
