<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas" width="1700" height="700"></canvas>
    <div id="horizontal-bar"></div>
    <div id="toolbar">
        <input type="color" id="color-picker" class="btn">
        <button id="pen-decreaser-btn" class="btn">-</button>
        <span id="pen-width-label"></span>
        <button id="pen-increaser-btn" class="btn">+</button>
        <button id="clear-btn" class="btn">&#9711;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
